<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Твоят глас има значение</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
background:
linear-gradient(180deg,#021a4f,#000814);
color:white;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hidden{
display:none;
}

button {
padding:14px 18px;
margin:10px;
border:none;
border-radius:14px;
font-size:5vw;
max-font-size:18px;
cursor:pointer;
transition:0.2s;
}

.character {
width:12vw;
max-width:90px;
min-width:40px;
position:absolute;
bottom:8vh;
left:10%;
transition:0.35s ease;
}

.path{
position:absolute;
bottom:80px;
width:80%;
height:12px;
background:white;
border-radius:10px;
}

/* MOBILE VERSION */

@media (max-width: 600px){

img{
width:60px !important;
}

button{
font-size:18px !important;
padding:12px 18px !important;
}

h1, h2, h3, p{
font-size:18px !important;
text-align:center;
}

}

</style>
</head>

<body>
  
<canvas id="fireworks"></canvas>

<audio id="clickSound" src="click.mp3"></audio>
<audio id="successSound" src="success.mp3"></audio>

<div id="startScreen" class="screen">

<h1>Твоят глас има значение!</h1>

<button onclick="startGame()">Започни играта</button>

</div>


<div id="gameScreen" class="screen hidden">

<div class="path"></div>
  
<img src="hero.png" style="width:12vw; max-width:90px;">

<h2 id="questionBox"></h2>

<div id="answers"></div>

</div>


<div id="resultScreen" class="screen hidden">

<h1 id="resultTitle"></h1>

<img id="resultImage" width="300">

</div>


<script>

const questions=[
"Трябва ли да защитим децата си със всички мерки?",
"Трябва ли да подобрим семейната среда?",
"Да защитим ли работните места за българите?",
"Съгласни ли сте да взимаме още държавни кредити?",
"Искате ли повече референдуми?",
"Какво мислите за Зелената сделка?"
];

const correct=[
"ДА","ДА","ДА","НЕ","ДА","НЕ ПРИЕМАМ"
];

let index=0;
let mistakes=0;

function playClick(){
clickSound.currentTime=0;
clickSound.play();
}
  
function startGame(){

startScreen.classList.add("hidden");
gameScreen.classList.remove("hidden");

showQuestion();

}

function showQuestion(){

questionBox.innerText=questions[index];

if(index===5){

answers.innerHTML=`
<button onclick="answer('ПРИЕМАМ')">Приемам</button>
<button onclick="answer('НЕ ПРИЕМАМ')">Не приемам</button>
`;

}

else{

answers.innerHTML=`
<button onclick="answer('ДА')">Да</button>
<button onclick="answer('НЕ')">Не</button>
`;

}

}

function answer(choice){
playClick();
if(choice!==correct[index]){

mistakes++;

}

hero.style.left=(10+(index*12))+"%";

index++;

if(index<questions.length){

showQuestion();

}

else{

finishGame();

}

}

function finishGame(){

gameScreen.classList.add("hidden");
resultScreen.classList.remove("hidden");

if(mistakes<=2){

resultTitle.innerText="Вашият избор е ИТН";
resultImage.src="final.png";
successSound.play();
launchFireworks();

}

else{

resultTitle.innerText="Вашият избор е различен";

}

}

  const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function launchFireworks(){

for(let i=0;i<150;i++){

particles.push({

x:canvas.width/2,

y:canvas.height/2,

vx:(Math.random()-0.5)*12,

vy:(Math.random()-0.5)*12,

life:120

});

}

animateFireworks();

}

function animateFireworks(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.vx;

p.y+=p.vy;

p.life--;

ctx.fillStyle="gold";

ctx.fillRect(p.x,p.y,4,4);

});

particles=particles.filter(p=>p.life>0);

if(particles.length>0) requestAnimationFrame(animateFireworks);

}

</script>

</body>
</html>
